[[redirects]]
  from = "http://pet-plus.co.in/*"
  to = "https://pet-plus.co.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.pet-plus.co.in/*"
  to = "https://www.pet-plus.co.in/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; upgrade-insecure-requests; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://www.pet-plus.co.in https://pet-plus.co.in https://images.unsplash.com https://res.cloudinary.com; media-src 'self' blob: https://www.pexels.com https://*.pexels.com https://res.cloudinary.com; connect-src 'self' https://www.pet-plus.co.in https://pet-plus.co.in https://other-half-react.onrender.com https://api.razorpay.com https://www.google.com/recaptcha/; frame-src 'self' https://api.razorpay.com https://checkout.razorpay.com https://www.google.com/recaptcha/"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.{webp,png,jpg,jpeg,svg,gif,ico,woff2,css,js}"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
